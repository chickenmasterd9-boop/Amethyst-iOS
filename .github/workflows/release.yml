name: Release build

on:
  workflow_dispatch:

jobs:
  build:
    name: Release build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 2
            platform_name: ios
          - platform: 3
            platform_name: tvos

    runs-on: macos-15
    steps:
      - name: Clean Workspace Context
        env:
          password: ${{ secrets.ELLIE_MINI_SECRET }}
        run: |
          rm -rf ./* || true
          rm -rf ./.??* || true
          
      - name: Checkout Codebase with All Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Provision Homebrew Compilation Tools
        run: |
          brew install make ldid dpkg pkg-config
          brew install --cask temurin@8
          
          # Enforce proper path resolution priorities for the compiler toolchains
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Compile and Package Application Binary Target
        env:
          password: ${{ secrets.ELLIE_MINI_SECRET }}
          RUNNER: 1
        run: |
          # 1. Bind path explicitly to satisfied Homebrew Cask JDK 8 home
          export JAVA_HOME=/Library/Java/JavaVirtualMachines/temurin-8.jdk/Contents/Home
          export PATH=$JAVA_HOME/bin:$PATH
          
          # 2. Complete prerequisite compilations sequentially
          gmake dep_mg
          gmake assets
          gmake native
          
          # 3. Direct Patch: Strip the empty class file validation rule from sub-makefile
          sed -i '' 's/check_empty_classes//g' JavaApp/Makefile
          
          gmake java

          # 4. Direct Patch: Strip the strict local JRE packaging rule from root Makefile
          # This forces gmake package to skip looking for a local jre8-*.tar.xz archive
          sed -i '' 's/internal_jar jre/internal_jar/g' Makefile
          sed -i '' 's/internal_jar_trollstore jre/internal_jar_trollstore/g' Makefile

          # 5. Process packaging loops based on target configuration
          if [ "${{ matrix.platform_name }}" == "ios" ]; then
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }}
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1
          elif [ "${{ matrix.platform_name }}" == "tvos" ]; then
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1
          else
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }}
          fi

      - name: Archive Standard Distribution IPA Packages
        uses: actions/upload-artifact@v4
        with:
          name: net.kdt.pojavlauncher-${{ matrix.platform_name }}-standard
          path: artifacts/*.ipa

      - name: Archive TrollStore Distribution TIPA Packages
        uses: actions/upload-artifact@v4
        with:
          name: net.kdt.pojavlauncher-${{ matrix.platform_name }}-trollstore
          path: artifacts/*.tipa

      - name: Archive Core Native Binary Debug Symbols
        uses: actions/upload-artifact@v4
        if: matrix.platform_name == 'ios'
        with:
          name: PojavLauncher.dSYM
          path: artifacts/*.dSYM
