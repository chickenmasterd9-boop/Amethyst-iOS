name: Amethyst CI (Custom Build)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform_name }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 2
            platform_name: ios

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Homebrew Cache Staging
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Setup Java Native Compiler Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build for ${{ matrix.platform_name }}
        env:
          password: ${{ secrets.ELLIE_MINI_SECRET }}
        run: |
          # 1. Provision build tools
          brew install make
          brew install --cask temurin@8
          brew install ldid dpkg pkg-config
          
          export PATH=/opt/homebrew/opt/make/libexec/gnubin:/opt/procursus/bin:/opt/homebrew/bin:$PATH
          export RUNNER=1
          
          # 2. Run compile targets sequentially (gmake jre is removed to bypass fragile wildcards)
          gmake dep_mg
          gmake assets
          gmake native
          gmake java
          
          # 3. Packaging rules based on matrix target parameters
          if [ "${{ matrix.platform_name }}" == "ios" ]; then
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }}
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1
          elif [ "${{ matrix.platform_name }}" == "tvos" ]; then
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1
          else
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }}
          fi

      - name: Upload Compiled Distribution Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-${{ matrix.platform_name }}-Build
          path: |
            *.ipa
            *.tipa
            *.deb
            Natives/build/*.dSYM
