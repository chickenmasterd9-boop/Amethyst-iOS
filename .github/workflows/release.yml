name: Release build

on:
  workflow_dispatch:

jobs:
  build:
    name: Release build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 2
            platform_name: ios

    runs-on: macos-15
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Provision Homebrew Packages
        run: |
          brew install make ldid dpkg pkg-config
          # Enforce proper path resolution priorities for the compiler toolchains
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Setup Java Native Compiler Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build for ${ { matrix.platform_name } }
        env:
          password: ${{ secrets.ELLIE_MINI_SECRET }}
          RUNNER: 1
        run: |
          # 1. Execute required underlying codebase compilations sequentially
          gmake dep_mg
          gmake assets
          gmake native
          
          # 2. Inject explicit target pathing to override empty byte stub check optimizations
          mkdir -p JavaApp/build/classes/org/lwjgl/glfw/
          echo "" > JavaApp/build/classes/org/lwjgl/glfw/GLFWunctions.class
          
          gmake java
          
          # 3. Assemble application packages using local architecture definitions
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }}
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1

      - name: Upload Regular Distribution IPA
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-Standard-iOS
          path: artifacts/*.ipa

      - name: Upload TrollStore Distribution TIPA
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-TrollStore-iOS
          path: artifacts/*.tipa

      - name: Upload PojavLauncher Core Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: PojavLauncher.dSYM
          path: artifacts/*.dSYM
